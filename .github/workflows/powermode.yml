name: POWERMODE Auto Scan

on:

  schedule:

    - cron: "0 8 * * *"

    - cron: "0 15 * * *"

  workflow_dispatch:

jobs:

  run-powermode:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo

        uses: actions/checkout@v4

      - name: Set up Python

        uses: actions/setup-python@v5

        with:

          python-version: "3.11"

      - name: Install packages

        run: |pip install yfinance pandas numpy openpyxl pandas-ta

          

      - name: Telegram start

        run: |

          python - <<'PY'

          import requests

          requests.post(

              "https://api.telegram.org/bot8682008294:AAG2ssNDJKPy3dYEkoqg5EHKWz2quyNdcZ0/sendMessage",

              data={"chat_id": "6375369326", "text": "POWERMODE starter scan 🚀"}

          )

          PY

      - name: Run Oslo V7.1

        run: python POWERMODE_OSLO_V71_FULL_CELL.py

      - name: Run Oslo V4.2

        run: python POWERMODE_V42_FULL_CELL.py

      - name: Run Sverige V8.1

        run:  python POWERMODE_SVERIGE_V81_KORRIGERT_FULL_CELL.py

      - name: Run Master

        run: python POWERMODE_MASTER_CELL.py

      - name: Telegram success

        if: success()

        run: |

          python - <<'PY'

          import requests

          requests.post(

              "https://api.telegram.org/bot8682008294:AAG2ssNDJKPy3dYEkoqg5EHKWz2quyNdcZ0/sendMessage",

              data={"chat_id": "6375369326", "text": "POWERMODE ferdig ✅"}

          )

          PY

      - name: Telegram failure

        if: failure()

        run: |

          python - <<'PY'

          import requests

          requests.post(

              "https://api.telegram.org/bot8682008294:AAG2ssNDJKPy3dYEkoqg5EHKWz2quyNdcZ0/sendMessage",

              data={"chat_id": "6375369326", "text": "POWERMODE feilet ❌ Sjekk GitHub Actions."}

          )

          PY
