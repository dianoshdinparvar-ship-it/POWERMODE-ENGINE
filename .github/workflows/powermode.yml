name: POWERMODE Auto Scan

on:

  workflow_dispatch:

  schedule:

    - cron: "0 8 * * *"

    - cron: "0 15 * * *"

  push:

    branches:

      - main

jobs:

  run-powermode:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo

        uses: actions/checkout@v4

      - name: Set up Python

        uses: actions/setup-python@v5

        with:

          python-version: "3.10"

      - name: Install packages

        run: |

          python -m pip install --upgrade pip

          pip install yfinance pandas numpy openpyxl requests

      - name: Telegram start

        run: curl -s -X POST "https://api.telegram.org/bot8682008294:AAG2ssNDJKPy3dYEkoqg5EHKWz2quyNdcZ0/sendMessage" -d "chat_id=6375369326" -d "text=POWERMODE starter scan"

      - name: Run Oslo V7.1

        run: python POWERMODE_OSLO_V71_FULL_CELL.py | tee oslo_v71.log

      - name: Run Oslo V4.2

        run: python POWERMODE_V42_FULL_CELL.py | tee oslo_v42.log

      - name: Run Sverige V8.1

        run: python POWERMODE_SVERIGE_V81_KORRIGERT_FULL_CELL.py | tee sverige_v81.log

      # Master deaktivert – bruker Colab-minne

      # - name: Run Master

      #   run: python POWERMODE_MASTER_CELL.py

      - name: Telegram success

        if: success()

        run: |

          python - <<'PY'

          import requests

          def read_tail(file, lines=35):

              try:

                  with open(file, "r", encoding="utf-8", errors="ignore") as f:

                      return "\n".join(f.read().splitlines()[-lines:])

              except Exception:

                  return ""

          msg = "POWERMODE ferdig ✅\n\n"

          msg += "OSLO V7.1\n"

          msg += read_tail("oslo_v71.log", 35)

          msg += "\n\nSVERIGE V8.1\n"

          msg += read_tail("sverige_v81.log", 25)

          requests.post(

              "https://api.telegram.org/bot8682008294:AAG2ssNDJKPy3dYEkoqg5EHKWz2quyNdcZ0/sendMessage",

              data={

                  "chat_id": "6375369326",

                  "text": msg[:3900]

              }

          )

          PY

      - name: Telegram failure

        if: failure()

        run: curl -s -X POST "https://api.telegram.org/bot8682008294:AAG2ssNDJKPy3dYEkoqg5EHKWz2quyNdcZ0/sendMessage" -d "chat_id=6375369326" -d "text=POWERMODE feilet. Sjekk GitHub Actions."
