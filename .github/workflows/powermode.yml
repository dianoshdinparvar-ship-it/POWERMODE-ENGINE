name: POWERMODE Auto Scan

on:

  schedule:

    - cron: "0 8 * * *"

    - cron: "0 15 * * *"

  workflow_dispatch:

jobs:

  run-powermode:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo

        uses: actions/checkout@v4

      - name: Set up Python

        uses: actions/setup-python@v5

        with:

          python-version: "3.10"

      - name: Install packages

        run: |

          python -m pip install --upgrade pip

          pip install yfinance pandas numpy openpyxl requests

      - name: Telegram start

        run: curl -s -X POST "https://api.telegram.org/bot8682008294:AAG2ssNDJKPy3dYEkoqg5EHKWz2quyNdcZ0/sendMessage" -d "chat_id=6375369326" -d "text=POWERMODE starter scan 🚀"

      - name: Run Oslo V7.1

        run: python POWERMODE_OSLO_V71_FULL_CELL.py

      - name: Run Oslo V4.2

        run: python POWERMODE_V42_FULL_CELL.py

      - name: Run Sverige V8.1

        run: python POWERMODE_SVERIGE_V81_KORRIGERT_FULL_CELL.py

       # Master deaktivert – bruker Colab-minne

      # - name: Run Master

      #   run: python POWERMODE_MASTER_CELL.py

            - name: Telegram success

        if: success()

        run: |

          python - <<'PY'

          import requests

          import subprocess

          result = subprocess.check_output(

              ["tail","-40","$GITHUB_STEP_SUMMARY"],

              text=True,

              shell=True

          )

          msg = "✅ POWERMODE ferdig\n\n" + result[:3500]

          requests.post(

              "https://api.telegram.org/bot8682008294:AAG2ssNDJKPy3dYEkoqg5EHKWz2quyNdcZ0/sendMessage",

              data={

                  "chat_id":"6375369326",

                  "text":msg

              }

          )

          PY
